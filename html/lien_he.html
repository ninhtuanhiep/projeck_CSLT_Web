<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/lien_he.css">
    <link rel="stylesheet" href="/css/responsive_trangchu.css">
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Liên hệ</title>
</head>
<body>
    <div id="header"></div>

    <div class="dieu-huong" style="position: relative;">
        <nav class="nav">
            <a class="trangchu" href="/html/trangchu.html">Trang chủ<i class="ti-angle-right"></i></a>
            <div><a class="lienhe" href="/html/lien_he.html"><span style="font-weight: 600; color: #333;">Liên hệ</span></a></div>
        </nav>
</div>


    <section class="content-box">
        <h1 style="margin: 0 0 27px;font-weight: 700; font-size: 30px; color: #626842;">Liên hệ với chúng tôi</h1>
        <div class="colum-content">
            <div class="colum-4">
                <div class="box-ic"><i class="fa-solid fa-phone"></i></div>
                <div class="info-ha">
                    <p>Hotline</p>
                    012345 - 78910
                </div>
            </div>
            <div class="colum-4">
                <div class="box-ic"><i class="fa-solid fa-envelope"></i></div>
                <div class="info-ha">
                    <p>Email</p>
                    Contact@abc.com
                </div>
            </div>
            <div class="colum-4">
                <div class="box-ic"><i class="fa-solid fa-map"></i></div>
                <div class="info-ha">
                    <p>Địa chỉ</p>
                    Trường Đại học Điện Lực, 235 Hoàng Quốc Việt, Cổ Nhuế, Bắc Từ Liêm, Hà Nội, Việt Nam
                </div>
            </div>
        </div>
        <h1 style="margin: 0 0 27px;font-weight: 700; font-size: 30px; color: #626842;">Gửi yêu cầu</h1>
        <div class="colum-content">
            <div class="colum-2">
                <form action="" method="post" enctype="application/x-www-form-urlencoded">
                    <input class="input-form text" type="text" name="name" placeholder="Họ và tên"> <br><br>
                    <input class="input-form number" type="text" name="sdt" placeholder="Số điện thoại"> <br><br>
                    <input class="input-form email" type="email" name="Email" placeholder="Email"> <br><br>
                    <textarea class="input-form noidung" name="noidung" id="" placeholder="Nội dung" style="max-width: 630px; min-height: 150px; overflow-y: hidden;"></textarea> <br><br>
                    <input class="submit" type="submit" value="Gửi yêu cầu" onclick="thongbao()">
                </form>
            </div>
            <div class="colum-2">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3209.7151464823996!2d105.78236331011243!3d21.046387980526454!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3135abb158a2305d%3A0x5c357d21c785ea3d!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyDEkGnhu4duIEzhu7Fj!5e1!3m2!1svi!2s!4v1744464047824!5m2!1svi!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </section>
    <div id="footer"></div>
    
</body>
