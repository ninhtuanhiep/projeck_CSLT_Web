                    <option value="15">Đà Nẵng</option>
                    <option value="16">Đắk Lắk</option>
                    <option value="17">Đắk Nông</option>
                    <option value="18">Điện Biên</option>
                    <option value="19">Đồng Nai</option>
                    <option value="20">Đồng Tháp</option>
                    <option value="21">Gia Lai</option>
                    <option value="22">Hà Giang</option>
                    <option value="23">Hà Nam</option>
                    <option value="24">Hà Nội</option>
                    <option value="25">Hà Tĩnh</option>
                    <option value="26">Hải Dương</option>
                    <option value="27">Hải Phòng</option>
                    <option value="28">Hòa Bình</option>

<div id="footer"></div>
</body>
<script>
    function kiemTraForm() {
        var ten = document.getElementById("ten").value.trim();
        var taikhoan = document.getElementById("taikhoan").value.trim();
        var matkhau = document.getElementById("matkhau").value.trim();
        var xacnhanmatkhau = document.getElementById("xacnhanmatkhau").value.trim();
        var email = document.getElementById("email").value.trim();
        var sdt = document.getElementById("sdt").value.trim();
        var diachi = document.getElementById("diachi").value.trim();

        if (ten === "" || taikhoan === "" || matkhau === "" || xacnhanmatkhau === "" || email === "" || sdt === "" || diachi === "") {
            alert("Vui lòng điền đầy đủ thông tin!");
            return false;
        }

        if (matkhau !== xacnhanmatkhau) {
            alert("Mật khẩu không khớp!");
            return false;
        }

        alert("Đăng ký thành công!");
        return true;
    }
</script>
